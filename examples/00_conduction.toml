# Steady state condition over a unit square
model = "conduction"
sim_name = "hello_world"

[mesh]
path = "./meshes/2d_square.msh"

[output]
directory = "../results"

[[material]]
kind = "builtin:constant_material"
density = 7
conductivity = 10
specific_heat_capacity = 12

[[boundary_condition]]
kind = "builtin:isothermal"
boundaries = ["left"]
temperature = 120

[[boundary_condition]]
kind = "builtin:isothermal"
boundaries = ["right"]
temperature = 200
