# Displacement and stress of a cantilever beam under its own weight
model = "elasticity"
sim_name = "cantilever"

[mesh]
path = "./meshes/cantilever.msh"

[output]
directory = "../results"

[solver]
tolerance = 1e-5 # elasiticty solves are a bit expensive so we lower our expectations

[[material]]
kind = "builtin:constant_material"
elastic_modulus = 2e11
poissons_ratio = 0.0 # as this approaches 0.5 the solver will struggle more and more.
density = 7000

[[boundary_condition]]
kind = "builtin:fixed"
boundaries = ["constraint"]
displacement = [0, 0, 0]

[[source]]
kind = "builtin:constant_source"
body_force = [0, 0, -77008.5] # ~ specific weight of steel on earth

[fields.displacement]
# Quadratic order for tetrahedral meshes is common in elasticity.
order = "Quadratic"