sim_name = "elastic_wave"
model = "small_strain"

[mesh]
path = "./meshes/3d_rect.msh"

[output]
directory = "../results"

[solver]
tolerance = 1e-7

[time_control]
start = 0.0
end = 5
timestep = 0.1

[[materials.small_strain]]
kind = "builtin:constant_material"
elastic_modulus = 400.0
poissons_ratio = 0.0
density = 1.0

[[boundaries.small_strain]]
kind = "builtin:fixed"
boundaries = ["end_left"]
displacement = [0, 0, 0]

[[boundaries.small_strain]]
kind = "builtin:constant_traction"
boundaries = ["end_right"]
traction = [0.0, 0.0, 2.0]


